<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 主盾牌形状 - 代表防护 -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096dd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#52c41a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#389e0d;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- 外层盾牌 -->
  <path d="M 100 20 L 160 50 L 160 120 Q 160 160 100 180 Q 40 160 40 120 L 40 50 Z"
        fill="url(#shieldGradient)"
        stroke="#0050b3"
        stroke-width="3"/>

  <!-- 内层防护网格 - 代表 WAF 过滤能力 -->
  <g opacity="0.3">
    <line x1="70" y1="60" x2="130" y2="60" stroke="white" stroke-width="2"/>
    <line x1="70" y1="80" x2="130" y2="80" stroke="white" stroke-width="2"/>
    <line x1="70" y1="100" x2="130" y2="100" stroke="white" stroke-width="2"/>
    <line x1="70" y1="120" x2="130" y2="120" stroke="white" stroke-width="2"/>
    <line x1="70" y1="140" x2="120" y2="140" stroke="white" stroke-width="2"/>

    <line x1="80" y1="50" x2="80" y2="145" stroke="white" stroke-width="2"/>
    <line x1="100" y1="50" x2="100" y2="150" stroke="white" stroke-width="2"/>
    <line x1="120" y1="50" x2="120" y2="145" stroke="white" stroke-width="2"/>
  </g>

  <!-- 中心 WAF 标识 - 波形代表流量检测 -->
  <g>
    <!-- 流量波形 -->
    <path d="M 60 100 Q 70 85 80 100 T 100 100 T 120 100 T 140 100"
          fill="none"
          stroke="url(#waveGradient)"
          stroke-width="4"
          stroke-linecap="round">
      <animate attributeName="d"
               dur="2s"
               repeatCount="indefinite"
               values="M 60 100 Q 70 85 80 100 T 100 100 T 120 100 T 140 100;
                       M 60 100 Q 70 115 80 100 T 100 100 T 120 100 T 140 100;
                       M 60 100 Q 70 85 80 100 T 100 100 T 120 100 T 140 100"/>
    </path>

    <!-- 检测点 -->
    <circle cx="80" cy="100" r="4" fill="#52c41a">
      <animate attributeName="cy" dur="2s" repeatCount="indefinite" values="100;115;100"/>
    </circle>
    <circle cx="120" cy="100" r="4" fill="#52c41a">
      <animate attributeName="cy" dur="2s" repeatCount="indefinite" values="100;85;100"/>
    </circle>
  </g>

  <!-- 防护成功标识 - 对勾 -->
  <path d="M 85 110 L 95 120 L 115 90"
        fill="none"
        stroke="white"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>
</svg>