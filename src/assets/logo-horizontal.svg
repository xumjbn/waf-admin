<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 横版 Logo - 适合导航栏 -->
  <defs>
    <linearGradient id="horizGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096dd9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 盾牌图标 -->
  <g transform="translate(10, 10)">
    <path d="M 50 10 L 85 25 L 85 65 Q 85 85 50 95 Q 15 85 15 65 L 15 25 Z"
          fill="url(#horizGradient)"
          stroke="#0050b3"
          stroke-width="2"/>

    <!-- 防护网格 -->
    <g opacity="0.4">
      <line x1="30" y1="35" x2="70" y2="35" stroke="white" stroke-width="1.5"/>
      <line x1="30" y1="50" x2="70" y2="50" stroke="white" stroke-width="1.5"/>
      <line x1="30" y1="65" x2="70" y2="65" stroke="white" stroke-width="1.5"/>
      <line x1="40" y1="25" x2="40" y2="75" stroke="white" stroke-width="1.5"/>
      <line x1="50" y1="25" x2="50" y2="80" stroke="white" stroke-width="1.5"/>
      <line x1="60" y1="25" x2="60" y2="75" stroke="white" stroke-width="1.5"/>
    </g>

    <!-- 对勾 -->
    <path d="M 40 55 L 47 62 L 60 42"
          fill="none"
          stroke="white"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- 文字部分 -->
  <text x="110" y="50"
        font-family="Arial, sans-serif"
        font-size="32"
        font-weight="bold"
        fill="#1890ff">
    CloudWall
  </text>
  <text x="110" y="80"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#595959">
    云墙 · WAF 管理平台
  </text>

  <!-- 状态指示 -->
  <circle cx="350" cy="60" r="6" fill="#52c41a">
    <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values="1;0.4;1"/>
  </circle>
  <text x="365" y="65"
        font-family="Arial, sans-serif"
        font-size="14"
        fill="#52c41a">
    防护中
  </text>
</svg>